spring:
  mongodb:
    uri: ${MONGO_URI}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  jwt:
    secret: ${JWT_SECRET}
  mail:
    from: ${MAIL_USERNAME}